name: Flask CI/CD Pipeline

on:
  push:
    branches: [main, staging]

permissions:
  contents: read

jobs:

# ----------- CI -----------  
  ci:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pylint bandit

      - name: Lint
        run: pylint app.py || true

      - name: Security scan
        run: bandit -r . -s B101,B104

      - name: Run tests
        run: pytest -v


# ----------- STAGING -----------  
  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy to Staging
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'

          set -e
          APP_DIR="/var/www/flask-app"

          echo "🚀 Staging Deploy"

          sudo rm -rf $APP_DIR
          sudo mkdir -p $APP_DIR
          sudo chown -R ec2-user:ec2-user $APP_DIR
          cd $APP_DIR

          git clone -b staging https://github.com/VenkyHM/CICD-Pipeline-FlaskApp.git .

          # Install dependencies (Amazon Linux)
          sudo dnf install -y python3 python3-pip nginx git

          python3 -m venv venv
          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt
          pip install gunicorn

          # Create systemd service
          sudo tee /etc/systemd/system/flask-app.service > /dev/null <<SERVICE
          [Unit]
          Description=Flask App
          After=network.target

          [Service]
          User=ec2-user
          Group=ec2-user
          WorkingDirectory=/var/www/flask-app
          Environment="PATH=/var/www/flask-app/venv/bin"
          Environment="MONGO_URI=${{ secrets.MONGO_URI }}"
          ExecStart=/var/www/flask-app/venv/bin/gunicorn -w 3 -b 127.0.0.1:5000 app:app
          Restart=always

          [Install]
          WantedBy=multi-user.target
SERVICE

          sudo systemctl daemon-reload
          sudo systemctl enable flask-app
          sudo systemctl restart flask-app

          sudo systemctl enable nginx
          sudo systemctl restart nginx

          echo "✅ Staging Done"
          EOF


# ----------- PRODUCTION -----------  
  deploy-production:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Deploy to Production
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'

          set -e
          APP_DIR="/var/www/flask-app"

          echo "🚀 Production Deploy"

          sudo rm -rf $APP_DIR
          sudo mkdir -p $APP_DIR
          sudo chown -R ec2-user:ec2-user $APP_DIR
          cd $APP_DIR

          git clone -b main https://github.com/VenkyHM/CICD-Pipeline-FlaskApp.git .

          sudo dnf install -y python3 python3-pip nginx git

          python3 -m venv venv
          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt
          pip install gunicorn

          sudo systemctl daemon-reload
          sudo systemctl restart flask-app
          sudo systemctl restart nginx

          echo "✅ Production Done"
          EOF
