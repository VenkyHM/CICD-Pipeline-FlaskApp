name: Flask CI/CD Pipeline

on:
  push:
    branches: [main, staging]

permissions:
  contents: read

jobs:

# ----------- CI -----------  
  name: Flask CI/CD Pipeline

on:
  push:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    env:
      MONGO_URI: mongodb+srv://venkat_travel_memory:V4vmib0EkunExfwy@cluster0.9wjyydp.mongodb.net/students?retryWrites=true&w=majority


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install project dependencies
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install CI tools separately
          pip install pytest pylint bandit

      - name: Lint with pylint
        run: |
          pylint app.py || true

      - name: Security scan with bandit
        run: |
          bandit -r . -s B104,B101

      - name: Run tests
        run: |
          pytest -v



# ----------- STAGING -----------  
  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy to Staging
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << EOF
          set -e

          APP_DIR="/var/www/flask-app"
          echo "🚀 Staging Deploy"

          sudo rm -rf \$APP_DIR
          sudo mkdir -p \$APP_DIR
          sudo chown -R \$USER:\$USER \$APP_DIR
          cd \$APP_DIR

          git clone -b staging https://github.com/VenkyHM/CICD-Pipeline-FlaskApp.git .

          echo "MONGO_URI=${MONGO_URI}" > .env

          sudo apt update -y
          sudo apt install -y python3-venv python3-pip nginx

          python3 -m venv venv
          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt
          pip install gunicorn

          sudo systemctl daemon-reload
          sudo systemctl restart flask-app || true
          sudo systemctl restart nginx || true

          echo "✅ Staging Done"
          EOF


# ----------- PRODUCTION -----------  
  deploy-production:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Deploy to Production
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << EOF
          set -e

          APP_DIR="/var/www/flask-app"
          echo "🚀 Production Deploy"

          sudo rm -rf \$APP_DIR
          sudo mkdir -p \$APP_DIR
          sudo chown -R \$USER:\$USER \$APP_DIR
          cd \$APP_DIR

          git clone -b main https://github.com/VenkyHM/CICD-Pipeline-FlaskApp.git .

          echo "MONGO_URI=${MONGO_URI}" > .env

          sudo apt update -y
          sudo apt install -y python3-venv python3-pip nginx

          python3 -m venv venv
          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt
          pip install gunicorn

          sudo systemctl daemon-reload
          sudo systemctl restart flask-app || true
          sudo systemctl restart nginx || true

          echo "✅ Production Done!"
          EOF
